name: check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  r-cmd-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - RCallsC
          - RCallsRustC
          - RCallsRustExtendrFfi
          - RCallsRustExtendr
          - RCallsRustSavvy
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Install R dependencies
        shell: Rscript {0}
        run: install.packages(c("tinytest", "bench", "ggplot2", "rmarkdown", "knitr"))
      - name: Check
        run: make check-${{ matrix.package }}

  benchmark:
    runs-on: ubuntu-latest
    needs: r-cmd-check
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Install R dependencies
        shell: Rscript {0}
        run: install.packages(c("tinytest", "bench", "ggplot2", "rmarkdown", "knitr"))
      - name: Run benchmark and render report
        env:
          RCALLSRUST_BENCH_ITERS: 200
          RCALLSRUST_BENCH_CPU: auto
        run: make report
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results/r-calls-rust.csv
            benchmark-results/r-calls-rust.rds
            benchmarks/benchmark.md
            benchmarks/benchmark_files/**
